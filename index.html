<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <h1 class="text-3xl font-bold text-sky-500 pt-5 text-center bg-gray-700">
      Simple Todo List
    </h1>
    <form action="" id="taskform" class="max-w-md mx-auto mt-10 p-6 bg-white rounded shadow">
        <label for="task" class="block text-xl pl-4 font-medium text-gray-700 mt-4">Task:</label>
        <input
            type="text"
            placeholder="Enter a task"
            name="task"
            id="task"
            class="border border-gray-300 min-w-0 grow rounded px-4 py-2 w-full mt-4 focus:outline focus:ring-2 focus:ring-green-500 focus:border-transparent"
        />
        <button type="submit" class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded mt-4 ml-6" id="addTaskButton">
          Add Task
        </button>
        <button type="button" class="bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded mt-4 ml-6" id="clearTasksButton">
          Clear all Tasks
        </button>

    </form>
    <div id="taskList" class="max-w-md mx-auto mt-10 p-6 bg-white rounded shadow">
      <h4 class="text-xl font-bold text-gray-700 mb-4 text-center">Tasks list</h4>
    <ul id="taskslist" class="list-disc list-inside text-gray-600">
    </ul>
    </div>
<script>
  // Load tasks array of objects, or default to empty
  let tasks = JSON.parse(localStorage.getItem("my_todo_tasks")) || [];

  // Render saved tasks on page load
  renderhtml();

  function renderhtml() {
    const listContainer = document.getElementById("taskslist");
    
    // Generate HTML with a delete button for each item
    listContainer.innerHTML = tasks.map(task => `
      <li class="flex justify-between items-center border-b border-gray-100 py-2">
        <span>${task.text}</span>
        <button 
          onclick="deleteTask(${task.id})" 
          class="bg-red-100 hover:bg-red-500 text-red-600 hover:text-white text-xs font-bold px-2 py-1 rounded transition"
        >
          Delete
        </button>
      </li>
    `).join("");
  }

  function saveToStorage() {
    localStorage.setItem("my_todo_tasks", JSON.stringify(tasks));
  }

  // Handle adding a new task
  document.getElementById("taskform").addEventListener("submit", (e) => {
    e.preventDefault();
    let taskInput = document.getElementById("task");
    let taskValue = taskInput.value.trim();
    
    if (taskValue) {
      // Create a unique object for the task using Date.now() as the ID
      tasks.push({
        id: Date.now(),
        text: taskValue
      });  
      
      renderhtml();
      saveToStorage();
      document.getElementById("taskform").reset(); 
    }
  });

  // New function to filter out the deleted task
  function deleteTask(idToKill) {
    tasks = tasks.filter(task => task.id !== idToKill);
    renderhtml();
    saveToStorage();
  }

  // Handle clearing all tasks
  document.getElementById("clearTasksButton").addEventListener("click", () => {
    tasks = [];
    renderhtml();
    saveToStorage();
  });
</script>
  </body>
</html>
